    #confetti-canvas {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 999;
      background: transparent !important;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 24px;
    }

    #mainTitle { font-size: 32px; color: #4a1a7a; text-align: center; }
    #subTitle  { font-size: 18px; color: #7a4fa3; text-align: center; }

    .cake-wrap {
      position: relative;
      width: 480px;
      height: 480px;
    }

    
    #cakeSvg {
      width: 480px;
      height: 480px;
      image-rendering: pixelated;
    }

  
    .candle-layer {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
    }

    
    .candle {
      position: absolute;
      display: flex;
      flex-direction: column;   
      align-items: center;
      width: 12px;
    }

    
    .candle::before {
      content: '';
      display: block;
      width: 6px;
      height: 12px;
      border-radius: 50% 50% 30% 30%;
      animation: flicker 0.5s infinite alternate;
      margin-bottom: 0;
    }

    
    .candle::after {
      content: '';
      display: block;
      width: 10px;
      height: 32px;
      border-radius: 2px;
    }

    .purple-candle::before { background: radial-gradient(ellipse at 60% 30%, #fff7aa, #ffe066, #ffaa00); box-shadow: 0 0 8px 3px #ffcc00, 0 0 16px 6px rgba(255,180,0,0.4); }
    .purple-candle::after  { background: linear-gradient(to right, #c080f0, #b06fe0, #9050c0); }

    .pink-candle::before   { background: radial-gradient(ellipse at 60% 30%, #fff7aa, #ffe066, #ffaa00); box-shadow: 0 0 8px 3px #ffcc00, 0 0 16px 6px rgba(255,180,0,0.4); }
    .pink-candle::after    { background: linear-gradient(to right, #f8b0c8, #f48fb1, #e06090); }

    .blue-candle::before   { background: radial-gradient(ellipse at 60% 30%, #fff7aa, #ffe066, #ffaa00); box-shadow: 0 0 8px 3px #ffcc00, 0 0 16px 6px rgba(255,180,0,0.4); }
    .blue-candle::after    { background: linear-gradient(to right, #a0c8ff, #82b1ff, #5090e0); }

    .gold-candle::before   { background: radial-gradient(ellipse at 60% 30%, #fff7aa, #ffe066, #ffaa00); box-shadow: 0 0 8px 3px #ffcc00, 0 0 16px 6px rgba(255,180,0,0.4); }
    .gold-candle::after    { background: linear-gradient(to right, #ffe080, #ffd54f, #e0a820); }

    @keyframes flicker {
      0%   { transform: scaleX(1)   scaleY(1)   translateY(0px);   opacity: 1; }
      33%  { transform: scaleX(0.8) scaleY(1.15) translateY(-1px); opacity: 0.95; }
      66%  { transform: scaleX(1.1) scaleY(0.9) translateY(1px);  opacity: 0.9; }
      100% { transform: scaleX(0.9) scaleY(1.1) translateY(-1px); opacity: 1; }
    }

    .candle.blown::before {
      animation: none;
      background: transparent;
      box-shadow: none;
      opacity: 0;
    }
    .candle.blown::after { opacity: 0.45; }
  </style>

  <script>
    
    const params = new URLSearchParams(location.search);
    const name = params.get('name') || 'Friend';
    let candleCount = Math.min(Math.max(parseInt(params.get('candles')) || 4, 1), 20);

    document.getElementById('mainTitle').textContent = 'Happy Birthday! Rusan Poseidon';

   
    const colors = ['purple-candle','pink-candle','blue-candle','gold-candle'];
    const layer  = document.getElementById('candleLayer');
    const WRAP   = 480;

    function buildCandles(n) {
      layer.innerHTML = '';
      const perRow = 6;
      
      const topY = 108; 
      for (let i = 0; i < n; i++) {
        const row = Math.floor(i / perRow);
        const col = i % perRow;
        const inRow = Math.min(perRow, n - row * perRow);
        const spacing = (WRAP * 0.58) / (inRow + 1);
        const startX  = WRAP * 0.21;
        const x = startX + spacing * (col + 1) - 6;
        const y = topY - row * 46; 

        const el = document.createElement('div');
        el.className = 'candle ' + colors[Math.floor(Math.random() * colors.length)];
        el.style.left = x + 'px';
        el.style.top  = y + 'px';
        layer.appendChild(el);
      }
    }
    buildCandles(candleCount);

    // ── Confetti ──
    const canvas = document.getElementById('confetti-canvas');
    const ctx    = canvas.getContext('2d');
    function resizeCanvas() { canvas.width = innerWidth; canvas.height = innerHeight; }
    resizeCanvas();
    addEventListener('resize', resizeCanvas);

    const CONFETTI_COLORS = ['#b06fe0','#d4a0f7','#7c3aad','#e8c8ff','#f9d4ff',
                             '#9b59d0','#c084fc','#ffe4ff','#ffffff','#f0c0ff','#ffd6ff'];
    let particles = [], animId = null;

    function spawnConfetti() {
      particles = [];
      for (let i = 0; i < 220; i++) {
        particles.push({
          x: Math.random() * canvas.width,
          y: -20 - Math.random() * 250,
          w: 7  + Math.random() * 10,
          h: 4  + Math.random() * 7,
          color: CONFETTI_COLORS[Math.floor(Math.random() * CONFETTI_COLORS.length)],
          angle: Math.random() * Math.PI * 2,
          spin:  (Math.random() - 0.5) * 0.25,
          vx:    (Math.random() - 0.5) * 4,
          vy:    1.5 + Math.random() * 4,
          opacity: 1,
          circle: Math.random() > 0.4
        });
      }
    }

    function drawConfetti() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      let alive = false;
      for (const p of particles) {
        p.x += p.vx; p.y += p.vy; p.angle += p.spin;
        p.vy += 0.06; p.opacity = Math.max(0, p.opacity - 0.004);
        if (p.y < canvas.height + 30 && p.opacity > 0) alive = true;
        ctx.save();
        ctx.globalAlpha = p.opacity;
        ctx.translate(p.x, p.y); ctx.rotate(p.angle);
        ctx.fillStyle = p.color;
        if (p.circle) {
          ctx.beginPath(); ctx.arc(0, 0, p.w/2, 0, Math.PI*2); ctx.fill();
        } else {
          ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
        }
        ctx.restore();
      }
      if (alive) animId = requestAnimationFrame(drawConfetti);
      else ctx.clearRect(0, 0, canvas.width, canvas.height);
    }

    function launchConfetti() {
      if (animId) cancelAnimationFrame(animId);
      spawnConfetti(); drawConfetti();
    }

    // ── Blow out ──
    let blown = false;
    function blowOut() {
      if (blown) return;
      blown = true;

      const candles = layer.querySelectorAll('.candle');
      candles.forEach(c => {
        setTimeout(() => c.classList.add('blown'), Math.random() * 900);
      });

      setTimeout(launchConfetti, 800);

      setTimeout(() => {
        document.getElementById('subTitle').textContent = 'SHEEESH 🔥';
        const music = document.getElementById('bdayMusic');
        music.volume = 0.7;
        music.play().catch(() => {});
      }, 1100);
    }

    // ── Mic blow detection ──
    async function startMic() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        const ac     = new (window.AudioContext || window.webkitAudioContext)();
        const src    = ac.createMediaStreamSource(stream);
        const an     = ac.createAnalyser();
        an.fftSize   = 512;
        src.connect(an);
        const buf = new Uint8Array(an.fftSize);
        let frames = 0;

        (function detect() {
          an.getByteTimeDomainData(buf);
          let sum = 0;
          for (const v of buf) { const n = (v-128)/128; sum += n*n; }
          const rms = Math.sqrt(sum / buf.length);
          if (rms > 0.15) { if (++frames >= 3) blowOut(); }
          else frames = 0;
          requestAnimationFrame(detect);
        })();
      } catch(e) { console.error('Mic error', e); }
    }

    startMic();
  </script>
</body>
